[project]
name = "ai-mcp-server"
version = "0.1.0"
description = "MCP Server 实现"
requires-python = ">=3.11"
dependencies = [
    "ai-core",
    "mcp>=1.0.0",
]

[tool.uv.sources]
ai-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/ai_mcp_server"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
